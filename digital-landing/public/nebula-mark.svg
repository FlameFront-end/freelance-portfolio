  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="13.5" fill="none" stroke="rgba(255,255,255,0.16)"/>

  <circle cx="32" cy="32" r="11" fill="url(#orb)"/>
  <ellipse cx="32" cy="32" rx="18" ry="8.5" fill="none" stroke="url(#ring)" stroke-width="3" transform="rotate(-18 32 32)"/>
  <circle cx="45.5" cy="25" r="2.1" fill="#ffffff"/>

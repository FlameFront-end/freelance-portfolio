<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>ChainPilot</title>
    <meta
      name="description"
      content="ChainPilot is a premium Web3 dashboard for tracking assets, transactions, and analytics across chains."
    />
    <meta
      name="keywords"
      content="ChainPilot, crypto dashboard, web3, onchain analytics, digital assets"
    />
    <meta name="author" content="ChainPilot" />
    <meta name="application-name" content="ChainPilot" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="color-scheme" content="dark light" />
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    <meta name="theme-color" content="#0b0e14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ChainPilot" />
    <meta property="og:title" content="ChainPilot" />
    <meta
      property="og:description"
      content="Premium Web3 dashboard with multi-page analytics and transaction monitoring."
    />
    <meta property="og:image" content="/chainpilot.svg" />
    <meta property="og:image:alt" content="ChainPilot logo" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ChainPilot" />
    <meta
      name="twitter:description"
      content="Premium Web3 dashboard with analytics and transaction monitoring."
    />
    <meta name="twitter:image" content="/chainpilot.svg" />

    <link rel="icon" type="image/svg+xml" href="/chainpilot.svg" />
    <link rel="apple-touch-icon" href="/chainpilot.svg" />
    <script>
      ;(() => {
        const storageKey = 'chainpilot-theme'
        const root = document.documentElement

        try {
          const savedTheme = localStorage.getItem(storageKey)
          const isValid = savedTheme === 'dark' || savedTheme === 'light'
          const preferredTheme = window.matchMedia('(prefers-color-scheme: light)').matches
            ? 'light'
            : 'dark'
          const theme = isValid ? savedTheme : preferredTheme

          root.dataset.theme = theme
          root.style.colorScheme = theme
        } catch {
          root.dataset.theme = 'dark'
          root.style.colorScheme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
